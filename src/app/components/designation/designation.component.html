<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header bg-info">Designation List</div>
      <div class="card-body">
        <ul>
          @for (item of designationList; track $index) {
          <li>
            <span>{{ item.designation }}</span>
          </li>
          }
        </ul>
      </div>
    </div>
  </div>
</div>
